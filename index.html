<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkillGapAI - Career Planner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm p-4">
        <h2 class="mb-4">🚀 SkillGapAI: Career Planner</h2>
        
        <form action="/analyze" method="POST" enctype="multipart/form-data">
            
            <div class="mb-3">
                <label>Upload Resume (PDF, DOCX, or Image):</label>
                <input type="file" name="resume" class="form-control" accept=".pdf,.docx,.png,.jpg,.jpeg" required>
            </div>
            
            <div class="mb-3">
                <label>Upload Job Description (PDF/DOCX):</label>
                <input type="file" name="jobdesc" class="form-control" accept=".pdf,.docx" required>
            </div>

            <div class="mb-3">
                <label>Enter Your Desired Role:</label>
                <input type="text" name="target_role" class="form-control" placeholder="e.g. Data Scientist" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Analyze & Generate Roadmap</button>
        </form>
    </div>
</body>
</html>
